name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: check
        run: |
          echo "Comparaison des fichiers..."

          CHANGED=$(git diff --name-only HEAD^ HEAD)

          echo "$CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "Aucun changement détecté."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Des changements ont été détectés."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  build-image:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deployment finished
        run: |
          echo "Image Docker créée et publiée avec succès."

  no-changes:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'false'

    runs-on: ubuntu-latest

    steps:
      - name: Nothing to do
        run: |
          echo "Aucun changement détecté. Aucune image Docker n'est construite."